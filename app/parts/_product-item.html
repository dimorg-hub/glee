<article class="products__article">
	<img class="products__img" src="@@src" alt="Wooden radio">
	<div class="products__icons">
		<a class="products__icon products__icon--searh " href="#">
			<span class="sr-only"> searh-icon </span>
			<svg class="icon-wh">
				<use xlink:href="images/sprite.svg#searh"></use>
			</svg>
		</a>
		<button class="products__icon products__icon--like" type="button">
			<span class="sr-only"> cart-icon </span>
			<svg class="icon-wh">
				<use xlink:href="images/sprite.svg#cart"></use>
			</svg>
		</button>
		<button class="products__icon products__icon--like" type="button">
			<span class="sr-only"> like-icon </span>
			<svg class="icon-wh">
				<use xlink:href="images/sprite.svg#like"></use>
			</svg>
		</button>
	</div>
	<a class="products__link" href="#">
		<h3 class="products__name">@@name</h3>
	</a>
	<span class="products__cost">@@cost</span>
</article>
